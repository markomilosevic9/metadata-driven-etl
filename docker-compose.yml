x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@postgres/${AIRFLOW_POSTGRES_DB}"
  AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
  MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
  MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
  MINIO_SECURE: "${MINIO_SECURE:-false}"
  SPARK_MASTER_HOST: "${SPARK_MASTER_HOST}"
  SPARK_MASTER_PORT: "${SPARK_MASTER_PORT}"
  AIRFLOW_CONN_SPARK_DEFAULT: "spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}/?deploy-mode=client&queue=root.default"
  POSTGRES_ANALYTICS_HOST: "${POSTGRES_ANALYTICS_HOST}"
  POSTGRES_ANALYTICS_PORT: "${POSTGRES_ANALYTICS_PORT}"
  POSTGRES_ANALYTICS_DB: "${POSTGRES_ANALYTICS_DB}"
  POSTGRES_ANALYTICS_USER: "${POSTGRES_ANALYTICS_USER}"
  POSTGRES_ANALYTICS_PASSWORD: "${POSTGRES_ANALYTICS_PASSWORD}"
  PYTHONUSERBASE: "/home/airflow/.local"

services:

  # minio object storage
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # bucket setup runs once after minio is healthy
  minio-bucket-setup:
    image: minio/mc
    container_name: minio-bucket-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p myminio/input-data &&
      mc mb -p myminio/data-valid &&
      mc mb -p myminio/data-invalid &&
      mc mb -p myminio/motor-policy-dimensions &&
      echo 'Buckets created successfully' &&
      exit 0
      "
    volumes:
      - ./:/opt/motor-policy
    networks:
      - motor_policy_net

  # spark cluster
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    hostname: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=${SPARK_MASTER_HOST:-spark-master}
      - SPARK_MASTER_PORT=${SPARK_MASTER_PORT:-7077}
      - SPARK_MASTER_WEBUI_PORT=${SPARK_MASTER_WEBUI_PORT:-8081}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - POSTGRES_ANALYTICS_HOST=${POSTGRES_ANALYTICS_HOST}
      - POSTGRES_ANALYTICS_PORT=${POSTGRES_ANALYTICS_PORT}
      - POSTGRES_ANALYTICS_DB=${POSTGRES_ANALYTICS_DB}
      - POSTGRES_ANALYTICS_USER=${POSTGRES_ANALYTICS_USER}
      - POSTGRES_ANALYTICS_PASSWORD=${POSTGRES_ANALYTICS_PASSWORD}
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8081}:8081"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://${SPARK_MASTER_HOST:-spark-master}:${SPARK_MASTER_PORT:-7077}
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - POSTGRES_ANALYTICS_HOST=${POSTGRES_ANALYTICS_HOST}
      - POSTGRES_ANALYTICS_PORT=${POSTGRES_ANALYTICS_PORT}
      - POSTGRES_ANALYTICS_DB=${POSTGRES_ANALYTICS_DB}
      - POSTGRES_ANALYTICS_USER=${POSTGRES_ANALYTICS_USER}
      - POSTGRES_ANALYTICS_PASSWORD=${POSTGRES_ANALYTICS_PASSWORD}
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8081"
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # postgres
  postgres:
    image: postgres:14
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  postgres-analytics:
    image: postgres:14
    container_name: postgres-analytics
    hostname: postgres-analytics
    environment:
      POSTGRES_USER: ${POSTGRES_ANALYTICS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_ANALYTICS_DB}
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
      - ./sql/schema_init.sql:/docker-entrypoint-initdb.d/schema_init.sql
      - ./sql/metabase_db_init.sql:/docker-entrypoint-initdb.d/metabase_db_init.sql
    ports:
      - "5433:5432"
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_ANALYTICS_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  # airflow
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/motor-policy
    networks:
      - motor_policy_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@admin.com || true

        echo "Airflow init done"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
      postgres-analytics:
        condition: service_healthy
    environment:
      <<: *airflow-env
      SPARK_MASTER_URL: "spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}"
      PYTHONPATH: "/opt/motor-policy"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/motor-policy
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    networks:
      - motor_policy_net
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-analytics:
        condition: service_healthy
    environment:
      <<: *airflow-env
      SPARK_MASTER_URL: "spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}"
      PYTHONPATH: "/opt/motor-policy"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/motor-policy
    networks:
      - motor_policy_net
    command: airflow scheduler
    restart: on-failure

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - POSTGRES_ANALYTICS_HOST=${POSTGRES_ANALYTICS_HOST}
      - POSTGRES_ANALYTICS_PORT=${POSTGRES_ANALYTICS_PORT}
      - POSTGRES_ANALYTICS_DB=${POSTGRES_ANALYTICS_DB}
      - POSTGRES_ANALYTICS_USER=${POSTGRES_ANALYTICS_USER}
      - POSTGRES_ANALYTICS_PASSWORD=${POSTGRES_ANALYTICS_PASSWORD}
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # metabase for bi
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_ANALYTICS_USER}
      MB_DB_PASS: ${POSTGRES_ANALYTICS_PASSWORD}
      MB_DB_HOST: ${POSTGRES_ANALYTICS_HOST}
    depends_on:
      postgres-analytics:
        condition: service_healthy
    networks:
      - motor_policy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

volumes:
  minio_data:
  postgres_data:
  postgres_analytics_data:
  grafana_data:

networks:
  motor_policy_net:
    driver: bridge
