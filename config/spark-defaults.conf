# spark runtime defaults for the local standalone stack
# s3a credentials/endpoints are supplied by the airflow DAG or create_spark_session
# keep engine tuning here to avoid duplicating it in pipeline_config.yaml

# adaptive query execution
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true

# serialization
spark.serializer                                org.apache.spark.serializer.KryoSerializer

# modest local memory defaults
spark.driver.memory                             2g
spark.executor.memory                           4g
